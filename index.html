<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Sweeper</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="page">

  <header class="header">
    <h1>Task Sweeper 🧹</h1>
    <p class="sub">Reminders inteligentes de casa</p>
  </header>

  <section class="input-bar">

    <input id="taskInput" placeholder="Tarea..." />

    <input id="dateInput" type="date" />

    <select id="repeatType">
      <option value="none">Sin repetición</option>
      <option value="days14">Cada 14 días</option>
      <option value="weekly">Semanal</option>
      <option value="monthly">Mensual (mismo día)</option>
    </select>

    <button id="addBtn">Agregar</button>
    <button id="sweepBtn" class="secondary">Sweep</button>

  </section>

  <section id="taskList" class="grid"></section>

</div>

<script src="app.js" defer></script>

</body>
</html>
